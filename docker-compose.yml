version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gigshield_postgres
    environment:
      POSTGRES_USER:     gigshield
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       gigshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gigshield_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: gigshield_api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:    production
      PORT:        4000
      DATABASE_URL: postgresql://gigshield:password@postgres:5432/gigshield_db
      REDIS_URL:   redis://redis:6379
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["node", "dist/server.js"]

  # ─── ML Service ──────────────────────────────────────────
  ml:
    build:
      context:    ./ml
      dockerfile: Dockerfile
    container_name: gigshield_ml
    ports:
      - "8000:8000"
    environment:
      PORT:  8000
      DEBUG: "false"
    volumes:
      - ./ml:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: gigshield_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ml

volumes:
  postgres_data:
  redis_data:
